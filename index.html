<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>My Word Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ef;--sur:#fff;--sur2:#f0ede8;--bdr:#e2ddd6;
  --tx:#1a1612;--tx2:#6b6560;--tx3:#a09890;
  --ac:#2d6a4f;--ac-l:#e8f4ee;--ac2:#c77b3a;--ac2-l:#fdf2e5;
  --new:#5b7fa6;--new-b:#eaf0f8;--unf:#c77b3a;--unf-b:#fdf2e5;
  --mis:#b85454;--mis-b:#fdeaea;
  --fgt:#d946a8;--fgt-b:#fce8f6;
  --fam:#2d6a4f;--fam-b:#e8f4ee;
  /* 容易混淆：深靛蓝紫色 */
  --unk:#4338ca;--unk-b:#ede9fe;
  --r:16px;--rs:8px;
  --hl-blue:#00cfff;--hl-purple:#ff4fcf;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}
.nav{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;display:flex;align-items:center;gap:6px;height:52px;position:sticky;top:0;z-index:100;overflow-x:auto;}
.nav-logo{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--ac);margin-right:10px;white-space:nowrap;}
.nb{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-family:'Noto Sans SC',sans-serif;background:transparent;color:var(--tx2);white-space:nowrap;flex-shrink:0;}
.nb:hover{background:var(--sur2);}
.nb.active{background:var(--ac);color:#fff;}
.nav-bk{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bdr);cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;background:transparent;color:var(--tx3);white-space:nowrap;flex-shrink:0;margin-left:auto;}
.nav-bk:hover{background:var(--sur2);color:var(--tx);}
.view{display:none;padding:20px 16px;max-width:900px;margin:0 auto;}
.view.active{display:block;}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.schip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:2px solid transparent;}
.schip.new{background:transparent;color:var(--new);border-color:var(--new);}
.schip.unf{background:transparent;color:var(--unf);border-color:var(--unf);}
.schip.mis{background:transparent;color:var(--mis);border-color:var(--mis);}
.schip.fgt{background:transparent;color:var(--fgt);border-color:var(--fgt);}
.schip.fam{background:transparent;color:var(--fam);border-color:var(--fam);}
.schip.unk{background:transparent;color:var(--unk);border-color:var(--unk);}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.wcs{background:var(--sur);border-radius:var(--r);padding:14px 16px;border:1px solid var(--bdr);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:4px;}
.wcs:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);transform:translateY(-2px);}
.wcs-w{font-family:'Lora',serif;font-size:22px;font-weight:700;}
.wcs-i{font-family:'Noto Serif',serif;font-size:12px;color:var(--tx3);}
.wcs-p{font-size:11px;font-weight:500;color:var(--ac2);background:var(--ac2-l);padding:2px 7px;border-radius:10px;width:fit-content;}
.wcs-c{font-size:13px;color:var(--tx2);}
.wcs-t{margin-top:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;width:fit-content;}
.t-new{background:transparent;color:var(--new);}
.t-unf{background:transparent;color:var(--unf);}
.t-mis{background:transparent;color:var(--mis);}
.t-fgt{background:transparent;color:var(--fgt);}
.t-fam{background:transparent;color:var(--fam);}
.t-unk{background:var(--unk-b);color:var(--unk);}

/* 卡片区控制行 — 新顺序：new unf unk mis fgt fam */
.cls-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:680px;margin:0 auto 10px;}
.cb{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.cb.new{background:transparent;color:var(--new);border:1.5px solid var(--new);}
.cb.unf{background:transparent;color:var(--unf);border:1.5px solid var(--unf);}
.cb.mis{background:transparent;color:var(--mis);border:1.5px solid var(--mis);}
.cb.fgt{background:transparent;color:var(--fgt);border:1.5px solid var(--fgt);}
.cb.fam{background:transparent;color:var(--fam);border:1.5px solid var(--fam);}
.cb.unk{background:var(--unk-b);color:var(--unk);border:1.5px solid var(--unk);}

.fc-ctrl-row{display:flex;gap:8px;align-items:center;justify-content:center;max-width:680px;margin:0 auto 7px;flex-wrap:wrap;}
.ab{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:7px 18px;font-size:14px;cursor:pointer;color:var(--tx2);}
.ab:hover{background:var(--sur2);}
.fb{background:#2d6a4f;color:#fff;border:none;border-radius:10px;padding:9px 24px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:600;}
.fb:hover{opacity:.88;}
.fp{font-size:13px;color:var(--tx3);font-family:'DM Mono',monospace;white-space:nowrap;}

.fc-sinp-wrap{position:relative;display:flex;align-items:center;}
.fc-sinp-wrap input{padding:7px 30px 7px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;font-family:'Noto Sans SC',sans-serif;background:var(--sur);color:var(--tx);outline:none;width:160px;}
.fc-sinp-wrap input:focus{border-color:var(--ac);width:200px;transition:width .2s;}
.fc-sinp-wrap .clr-btn{position:absolute;right:6px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--tx3);padding:0;}
.fc-sdrop{position:absolute;top:calc(100% + 4px);left:0;min-width:240px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;display:none;}
.fc-sdrop.show{display:block;}
.fc-drop-item{padding:9px 14px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);}
.fc-drop-item:last-child{border-bottom:none;}
.fc-drop-item:hover{background:var(--sur2);}

.tbc{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.tbc:hover{border-color:#fff;transform:scale(1.2);}
.tbh{width:22px;height:14px;border-radius:3px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.tbh:hover{border-color:#fff;}
.tbsep{width:1px;height:16px;background:rgba(255,255,255,.2);flex-shrink:0;}
.tbclr{background:none;border:1px solid rgba(255,255,255,.35);border-radius:6px;color:#fff;font-size:10px;padding:2px 7px;cursor:pointer;white-space:nowrap;}
.tbsz{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fff;font-size:11px;padding:2px 5px;cursor:pointer;font-family:monospace;}
.tbsz:hover{background:rgba(255,255,255,.25);}

.sbadge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:3px;}
.sbadge.new{background:transparent;color:var(--new);}
.sbadge.unf{background:transparent;color:var(--unf);}
.sbadge.mis{background:transparent;color:var(--mis);}
.sbadge.fgt{background:transparent;color:var(--fgt);}
.sbadge.fam{background:transparent;color:var(--fam);}
.sbadge.unk{background:var(--unk-b);color:var(--unk);}

.card-scene{perspective:1200px;width:100%;max-width:680px;margin:0 auto;height:390px;user-select:none;}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);position:relative;}
.card-inner.flipped{transform:rotateY(180deg);}
.cf,.cb2{position:absolute;inset:0;background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:0 8px 32px rgba(0,0,0,.12);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;padding:10px 20px 10px;overflow-y:auto;}
.cf{justify-content:flex-start;}
.cb2{transform:rotateY(180deg);align-items:flex-start;justify-content:flex-start;}
.cf-top{display:flex;flex-direction:column;align-items:center;flex:1;width:100%;overflow-y:auto;padding-bottom:4px;}
.cf-bottom{width:100%;flex-shrink:0;border-top:1px solid var(--bdr);padding-top:6px;margin-top:3px;}
.spk-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
.spk{background:var(--ac-l);color:var(--ac);border:none;border-radius:24px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;}
.spk:hover{background:var(--ac);color:#fff;}

.rnote,.rnote-b{width:100%;min-height:36px;border:1px dashed var(--bdr);border-radius:8px;padding:6px 12px;font-family:'Microsoft YaHei','微软雅黑','Noto Sans SC',sans-serif;background:var(--sur2);color:var(--tx);line-height:1.6;outline:none;word-break:break-word;font-size:14px;}
.rnote-b{min-height:40px;font-size:13px;}
.rnote:empty::before,.rnote-b:empty::before{content:attr(data-ph);color:var(--tx3);pointer-events:none;font-style:italic;}

#ntb{position:fixed;z-index:9999;background:#1a1612;border-radius:12px;padding:7px 10px;display:none;gap:5px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.4);flex-wrap:wrap;max-width:360px;}
.tbl{font-size:10px;color:#888;white-space:nowrap;}

.cw{font-family:'Lora',serif;font-size:42px;font-weight:700;text-align:center;line-height:1.05;user-select:text;cursor:text;}
.ci{font-family:'Noto Serif',serif;font-size:20px;color:var(--tx3);margin-top:2px;text-align:center;outline:none;word-break:break-word;cursor:text;}
.cfe{margin-top:4px;text-align:center;width:100%;}
.cfe-en{font-family:'Lora',serif;font-size:21px;font-style:italic;color:var(--tx2);line-height:1.5;outline:none;word-break:break-word;display:block;text-align:center;width:100%;cursor:text;user-select:text;}

.cf-status-row{width:100%;display:flex;justify-content:flex-end;margin-bottom:2px;}

.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;max-height:60vh;overflow-y:auto;border:1px solid var(--bdr);border-radius:var(--rs);padding:10px;background:var(--sur);}
.vi{padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:2px;}
.vi:hover{background:var(--sur2);}
.vi.in{background:var(--new-b);color:var(--new);border-color:var(--new);}

.st{font-family:'Lora',serif;font-size:20px;font-weight:700;margin-bottom:18px;}
.fg{margin-bottom:16px;}
.fl{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px;}
.fi,.fs,.fta{width:100%;padding:9px 13px;border:1px solid var(--bdr);border-radius:var(--rs);font-size:15px;background:var(--sur);font-family:'Noto Sans SC',sans-serif;color:var(--tx);}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--ac);}
.fta{resize:vertical;min-height:65px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bp{background:var(--ac);color:#fff;border:none;border-radius:var(--rs);padding:11px 26px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.bs{background:var(--sur2);color:var(--tx2);border:1px solid var(--bdr);border-radius:var(--rs);padding:9px 18px;cursor:pointer;font-size:14px;font-family:'Noto Sans SC',sans-serif;font-weight:600;}
.bd{background:var(--mis-b);color:var(--mis);border:none;border-radius:var(--rs);padding:9px 18px;cursor:pointer;font-size:14px;font-family:'Noto Sans SC',sans-serif;font-weight:600;}
.bd:hover{background:var(--mis);color:#fff;}
.bg{background:var(--new-b);color:var(--new);border:none;border-radius:var(--rs);padding:9px 18px;cursor:pointer;font-size:14px;font-family:'Noto Sans SC',sans-serif;font-weight:600;}
.bg:hover{background:var(--new);color:#fff;}
.fcf{padding:6px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--sur);font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;color:var(--tx2);}

.mo,.vmo,.bko{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;}
.mo.show,.vmo.show,.bko.show{display:flex;}
.vmo{z-index:600;}.bko{z-index:700;}
.md,.vmd,.bkm{background:var(--sur);border-radius:var(--r);padding:24px;max-width:560px;width:92%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.vmd{max-width:480px;}.bkm{max-width:440px;}
.mt{font-family:'Lora',serif;font-size:19px;font-weight:700;margin-bottom:18px;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty-s{text-align:center;padding:50px 20px;color:var(--tx3);}
.no-flip{cursor:auto;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">📖 WordCards</span>
  <button class="nb active" onclick="showView('list',this)">单词列表</button>
  <button class="nb" onclick="showView('fc',this)">卡片学习</button>
  <button class="nb" onclick="showView('vocab',this)">导入词库</button>
  <button class="nb" onclick="showView('add',this)">添加单词</button>
  <button class="nav-bk" onclick="openBk()">💾 备份/恢复</button>
  <span id="sync-status" style="font-size:11px;color:var(--tx3);white-space:nowrap;flex-shrink:0;">☁️</span>
</nav>

<!-- 单词列表 -->
<div class="view active" id="view-list">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="word-grid" id="word-grid"></div>
  <div class="empty-s" id="empty-list" style="display:none"><div style="font-size:44px">📝</div><div>还没有单词，去添加或从词库导入！</div></div>
</div>

<!-- 卡片学习 -->
<div class="view" id="view-fc">
  <!-- 新顺序：new → unf → unk → mis → fgt → fam -->
  <div class="cls-row">
    <button class="cb new" onclick="classifyOnly('new')">🔵 新单词</button>
    <button class="cb unf" onclick="classifyOnly('unf')">🟠 发音不对</button>
    <button class="cb unk" onclick="classifyOnly('unk')">🟤 容易混淆</button>
    <button class="cb mis" onclick="classifyOnly('mis')">🔴 拼错字母</button>
    <button class="cb fgt" onclick="classifyOnly('fgt')">🟣 忘意思了</button>
    <button class="cb fam" onclick="classifyOnly('fam')">🟢 熟悉</button>
  </div>
  <div class="fc-ctrl-row">
    <button class="ab" onclick="prevCard()">← 上一个</button>
    <button class="ab" onclick="nextCard()">下一个 →</button>
    <button class="fb" onclick="flipCard()">↩ 翻转</button>
    <span class="fp" id="fcp">0 / 0</span>
    <div class="fc-sinp-wrap" style="position:relative;">
      <input type="text" id="fc-sinp" placeholder="🔍 搜索跳转…" oninput="fcSearchInput()" onkeydown="fcSearchKey(event)" autocomplete="off">
      <button class="clr-btn" onclick="fcSearchClear()">✕</button>
      <div class="fc-sdrop" id="fc-sdrop"></div>
    </div>
  </div>

  <div class="card-scene" id="card-scene">
    <div class="card-inner" id="ci">
      <!-- 正面 -->
      <div class="cf">
        <div class="cf-top">
          <div class="cf-status-row">
            <div id="cf-status" class="sbadge new">🔵 新单词</div>
          </div>
          <div class="cw no-flip" id="cfw" contenteditable="true" onmouseup="onNUp(event)" onfocus="lne=this" oninput="saveField('wordColorHtml','cfw')" spellcheck="false">—</div>
          <div class="ci no-flip" id="cfi" contenteditable="true"
            onfocus="lne=this"
            onmouseup="onNUp(event)"
            oninput="lne=this;saveField('ipaHtml','cfi')"></div>
          <div class="cfe no-flip" id="cfe"></div>
          <div id="cfn" class="rnote no-flip" contenteditable="true" data-ph="✏️ 标注… 选中文字后可单独改颜色"
            onfocus="lne=this"
            onmouseup="onNUp(event)"
            oninput="lne=this;saveN()"></div>
        </div>
        <div class="cf-bottom no-flip">
          <div class="spk-row">
            <button class="spk" id="spk-read">🔊 朗读</button>
            <button class="spk" id="spk-word">🎵 听发音</button>
          </div>
        </div>
      </div>
      <!-- 背面 -->
      <div class="cb2 no-flip" onclick="event.stopPropagation()">
        <div id="cbc" style="width:100%;display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;padding-bottom:8px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- 词库 -->
<div class="view" id="view-vocab">
  <div class="st">📚 常用词库</div>
  <p style="font-size:14px;color:var(--tx2);margin-bottom:14px;">点击单词 → 自动查询音标/例句/中文翻译 → 添加。蓝色=已在列表。</p>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
    <select class="fcf" id="vc" onchange="renderV()">
      <option value="basic">基础词汇 A1-A2 (1500+词)</option>
      <option value="inter">中级词汇 B1-B2 (1500+词)</option>
      <option value="adv">高级词汇 C1-C2 (1500+词)</option>
      <option value="biz">商务英语 (1500+词)</option>
      <option value="acad">学术词汇 (1200+词)</option>
      <option value="news">新闻用语 (1200+词)</option>
      <option value="tech">AI/电脑用语 (800+词)</option>
    </select>
    <input class="fcf" type="text" id="vs" placeholder="搜索…" oninput="renderV()" style="width:130px;">
    <span id="vcnt" style="font-size:13px;color:var(--tx3);"></span>
    <button class="bg" onclick="goToCardFromVocab()" style="margin-left:auto;">🃏 去看卡片</button>
  </div>
  <div class="vg" id="vg"></div>
</div>

<!-- 添加单词 -->
<div class="view" id="view-add">
  <div class="st">➕ 添加新单词</div>
  <div style="max-width:600px;">
    <div class="fr">
      <div class="fg">
        <label class="fl">英文单词 *</label>
        <input class="fi" id="fw" type="text" placeholder="e.g. serendipity" oninput="checkDup(this.value)">
        <div id="dup-hint" style="display:none;margin-top:4px;padding:6px 10px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;font-size:13px;color:#856404;">
          ⚠️ 这个单词已在列表中！
          <button onclick="goToDupCard()" style="margin-left:8px;background:#856404;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:12px;cursor:pointer;">去看这张卡片</button>
        </div>
      </div>
      <div class="fg"><label class="fl">IPA音标</label><input class="fi" id="fipa" type="text"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">词性</label>
        <select class="fs" id="fpos"><option value="n.">n. 名词</option><option value="v.">v. 动词</option><option value="adj.">adj. 形容词</option><option value="adv.">adv. 副词</option><option value="prep.">prep. 介词</option><option value="phrase">phrase 短语</option><option value="?">? 不详</option></select>
      </div>
      <div class="fg"><label class="fl">分类</label>
        <!-- 新顺序：new unf unk mis fgt fam -->
        <select class="fs" id="fst">
          <option value="new">🔵 新单词</option>
          <option value="unf">🟠 发音不对</option>
          <option value="unk">🟤 容易混淆</option>
          <option value="mis">🔴 拼错字母</option>
          <option value="fgt">🟣 忘意思了</option>
          <option value="fam">🟢 熟悉</option>
        </select>
      </div>

const firebaseConfig={apiKey:"AIzaSyALc1wKd0xMZU3v0jgNF_6XZy7UscMys7o",authDomain:"wordcard-3bd16.firebaseapp.com",projectId:"wordcard-3bd16",storageBucket:"wordcard-3bd16.firebasestorage.app",messagingSenderId:"692507567886",appId:"1:692507567886:web:f7b52e0ca07c9b95ebd95f"};
let db=null,docRef=null;
const USER_ID='main';
function initFirebase(){
  try{
    if(typeof firebase==='undefined')return;
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();docRef=db.collection('users').doc(USER_ID);
    setTimeout(()=>loadFromCloud(),800);
  }catch(e){console.warn('Firebase初始化失败:',e);}
}

async function forceSyncToCloud(){
  if(!db||!docRef){toast('⚠️ Firebase未连接，请刷新重试');return;}
  toast('⏳ 同步中，请稍候…');
  try{
    const ts=Date.now();
    await Promise.race([docRef.set({words:JSON.stringify(words),updatedAt:ts}),new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),15000))]);
    localStorage.setItem('wc_updated',ts.toString());
    toast('☁️ 同步成功！手机刷新即可看到全部单词');
  }catch(e){toast(e.message==='timeout'?'⚠️ 超时，请检查网络后重试':'❌ 失败：'+e.message);}
}
async function syncToCloud(){
  if(!db||!docRef)return;
  try{const ts=Date.now();await docRef.set({words:JSON.stringify(words),updatedAt:ts});localStorage.setItem('wc_updated',ts.toString());}catch(e){}
}
async function loadFromCloud(){
  if(!db||!docRef)return false;
  try{
    const snap=await docRef.get();
    if(snap.exists){
      const data=snap.data();const cloudWords=JSON.parse(data.words||'[]');const cloudTime=data.updatedAt||0;
      if(cloudWords.length>words.length){words=cloudWords;localStorage.setItem('wc_words',JSON.stringify(words));localStorage.setItem('wc_updated',cloudTime.toString());renderList();showSyncBadge('☁️ 已从云端同步 '+cloudWords.length+' 个单词');return true;}
    }
  }catch(e){}
  return false;
}

async function getCN(word){
  const base=word.toLowerCase();
  if(VCN[base])return VCN[base];
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(base));
    const d=await r.json();
    if(Array.isArray(d)&&d[0]){
      const ms=d[0].meanings||[];
      if(ms.length&&ms[0].definitions.length)return ms[0].partOfSpeech+': '+ms[0].definitions[0].definition.slice(0,40);
    }
  }catch(e){}
  return '';
}

function fcSearchInput(){
  const q=(document.getElementById('fc-sinp').value||'').toLowerCase().trim();
  const drop=document.getElementById('fc-sdrop');
  if(!q||!words.length){drop.classList.remove('show');return;}
  const res=words.filter(w=>w.word.toLowerCase().includes(q)||(w.cn&&w.cn.includes(q))).slice(0,8);
  if(!res.length){drop.innerHTML='<div class="fc-drop-item" style="color:var(--tx3);">未找到</div>';drop.classList.add('show');return;}
  drop.innerHTML=res.map(w=>`<div class="fc-drop-item" onclick="fcJump(${w.id})"><span style="font-family:'Lora',serif;font-weight:700;font-size:16px;color:${w.wordColor||'var(--tx)'};">${w.word}</span><span style="font-size:12px;color:var(--tx3);">${w.cn}</span><span style="font-size:10px;margin-left:auto;">${SE[w.status]}</span></div>`).join('');
  drop.classList.add('show');
}
function fcSearchKey(e){if(e.key==='Escape')fcSearchClear();}
function fcSearchClear(){document.getElementById('fc-sinp').value='';document.getElementById('fc-sdrop').classList.remove('show');}
function fcJump(id){
  let i=deck.findIndex(w=>w.id===id);
  if(i<0){const w=words.find(x=>x.id===id);if(w){deck.unshift({...w});i=0;}}
  if(i>=0){idx=i;flipped=false;document.getElementById('ci').classList.remove('flipped');renderCard();}
  fcSearchClear();
  toast('🔍 已跳转到：'+(words.find(x=>x.id===id)?.word||''));
}
document.addEventListener('click',e=>{if(!e.target.closest('.fc-sinp-wrap'))document.getElementById('fc-sdrop').classList.remove('show');});

function onNUp(e){
  const cfn=document.getElementById('cfn'),cfi=document.getElementById('cfi'),cbn=document.getElementById('cbn');
  const cfeEl=document.querySelector('.cfe-en');
  const cfwEl=document.getElementById('cfw');
  const cbcCn=document.getElementById('cbc-cn');
  const tgt=e.target;
  if(tgt===cfn||cfn?.contains(tgt))lne=cfn;
  else if(cbn&&(tgt===cbn||cbn.contains(tgt)))lne=cbn;
  else if(tgt===cfi||cfi?.contains(tgt))lne=cfi;
  else if(cfeEl&&(tgt===cfeEl||cfeEl.contains(tgt)))lne=cfeEl;
  else if(tgt===cfwEl||cfwEl?.contains(tgt))lne=cfwEl;
  else if(cbcCn&&(tgt===cbcCn||cbcCn.contains(tgt)))lne=cbcCn;
  else lne=lne||cfn;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.toString().trim()){hideTb();return;}
    const rng=sel.getRangeAt(0);
    const anc=rng.commonAncestorContainer;
    if(![cfn,cbn,cfi,cfeEl,cfwEl,cbcCn].some(el=>el&&el.contains(anc))){hideTb();return;}
    savedSel=rng;
    const rc=rng.getBoundingClientRect();
    const tb=document.getElementById('ntb');
    tb.style.display='flex';
    const tw=tb.offsetWidth||360;
    let lx=rc.left+window.scrollX+(rc.width/2)-(tw/2);
    lx=Math.max(8,Math.min(lx,window.innerWidth-tw-8));
    let ty=rc.top+window.scrollY-60;
    if(ty<60)ty=rc.bottom+window.scrollY+8;
    tb.style.left=lx+'px';tb.style.top=ty+'px';
  },10);
}
function hideTb(){document.getElementById('ntb').style.display='none';}
function apC(e,color,hl){
  e.preventDefault();
  if(!savedSel)return;
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedSel);
  const cfn=document.getElementById('cfn'),cbn=document.getElementById('cbn'),cfi=document.getElementById('cfi');
  const cfeEl=document.querySelector('.cfe-en');
  const cfwEl=document.getElementById('cfw');
  const cbcCn=document.getElementById('cbc-cn');
  const cont=savedSel.commonAncestorContainer;
  if(![cfn,cbn,cfi,cfeEl,cfwEl,cbcCn].some(el=>el&&el.contains(cont))){hideTb();savedSel=null;return;}
  if(color==='clr'&&hl==='clr')wrapSpan(savedSel,null,null,true);
  else wrapSpan(savedSel,color,hl,false);
  if(cfi?.contains(cont))saveField('ipaHtml','cfi');
  else if(cfeEl?.contains(cont))saveFieldEl('exEnHtml',cfeEl);
  else if(cfwEl?.contains(cont))saveField('wordColorHtml','cfw');
  else if(cbcCn?.contains(cont))saveField('cnHtml','cbc-cn');
  else saveN();
  hideTb();savedSel=null;
}
function apSz(e,sz){
  e.preventDefault();
  if(!savedSel)return;
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedSel);
  wrapSzSpan(savedSel,sz);
  saveN();hideTb();savedSel=null;
}
function apBold(e,isBold){
  e.preventDefault();
  if(!savedSel)return;
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedSel);
  wrapBoldSpan(savedSel,isBold);
  saveN();hideTb();savedSel=null;
}
function wrapBoldSpan(rng,isBold){
  const frag=rng.extractContents();
  const sp=document.createElement('span');
  sp.style.fontWeight=isBold?'700':'300';
  sp.appendChild(frag);rng.insertNode(sp);
}
function wrapSzSpan(rng,sz){
  const frag=rng.extractContents();
  const sp=document.createElement('span');
  sp.style.fontSize=sz+'px';
  sp.style.fontFamily="'Microsoft YaHei','微软雅黑','Noto Sans SC',sans-serif";
  sp.appendChild(frag);rng.insertNode(sp);
}
function wrapSpan(rng,color,hl,clr){
  const frag=rng.extractContents();
  function proc(nd){
    if(nd.nodeType===3){
      if(!nd.textContent||clr)return nd;
      const sp=document.createElement('span');
      if(color)sp.style.color=color;
      if(hl&&hl!=='transparent')sp.style.backgroundColor=hl;
      sp.appendChild(nd.cloneNode());return sp;
    }
    if(nd.nodeType===1){
      if(clr){nd.style.removeProperty('color');nd.style.removeProperty('background-color');nd.style.removeProperty('font-size');nd.style.removeProperty('font-weight');}
      else{if(color)nd.style.color=color;if(hl!==null){if(hl==='transparent')nd.style.removeProperty('background-color');else nd.style.backgroundColor=hl;}}
      Array.from(nd.childNodes).forEach(c=>{const r=proc(c);if(r!==c)nd.replaceChild(r,c);});
      return nd;
    }
    return nd;
  }
  const nf=document.createDocumentFragment();
  Array.from(frag.childNodes).forEach(c=>nf.appendChild(proc(c)));
  rng.insertNode(nf);
  const par=lne||document.getElementById('cfn');
  if(par)par.querySelectorAll('span').forEach(s=>{if(!s.style.cssText&&s.parentNode){const p=s.parentNode;while(s.firstChild)p.insertBefore(s.firstChild,s);p.removeChild(s);}});
}
function saveField(field,elId){
  if(!deck.length)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id),el=document.getElementById(elId);
  if(!o||!el)return;o[field]=el.innerHTML;w[field]=el.innerHTML;save();
}
function saveFieldEl(field,el){
  if(!deck.length||!el)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id);
  if(!o)return;o[field]=el.innerHTML;w[field]=el.innerHTML;save();
}
function saveN(){
  if(!deck.length)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id);
  if(!o)return;
  const el=lne||document.getElementById('cfn');
  if(!el)return;
  o.noteHtml=el.innerHTML;o.note=el.innerText;w.noteHtml=o.noteHtml;w.note=o.note;
  const fn=document.getElementById('cfn'),bn=document.getElementById('cbn');
  if(el===fn&&bn)bn.innerHTML=o.noteHtml;
  if(el===bn&&fn)fn.innerHTML=o.noteHtml;
  save();
}

// ══ 备份 ══
function openBk(){document.getElementById('bkc').textContent=words.length;document.getElementById('bkst').textContent='选择之前的 .json 文件恢复（合并，不删除已有）。';document.getElementById('bkf').value='';document.getElementById('bko').classList.add('show');}
function closeBk(){document.getElementById('bko').classList.remove('show');}
function exportBk(){
  const now=new Date();
  const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const blob=new Blob([JSON.stringify({version:1,exportDate:now.toISOString(),words},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`WordCards_${ds}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('✅ 已导出 '+words.length+' 个单词');
}
function importBk(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      const imp=Array.isArray(d)?d:(d.words||[]);
      if(!imp.length){document.getElementById('bkst').textContent='文件中没有单词数据';return;}
      const ids=new Set(words.map(w=>w.id)),ws=new Set(words.map(w=>w.word.toLowerCase()));
      let added=0;
      imp.forEach(w=>{
        if(!ids.has(w.id)&&!ws.has((w.word||'').toLowerCase())){
          ['noteHtml','ipaHtml','exEnHtml','wordColor','wordColorHtml'].forEach(k=>{if(!w[k])w[k]='';});
          if(!w.status||!SL[w.status])w.status='new';
          const sm={unfamiliar:'unf',misspell:'mis',forgot:'fgt',familiar:'fam'};
          if(sm[w.status])w.status=sm[w.status];
          words.push(w);added++;ids.add(w.id);ws.add((w.word||'').toLowerCase());
        }
      });
      save();document.getElementById('bkc').textContent=words.length;
      document.getElementById('bkst').textContent='✅ 导入 '+added+' 个新单词，共 '+words.length+' 个';
      if(added>0){renderList();toast('✅ 导入了 '+added+' 个单词');}else toast('没有新单词');
    }catch(err){document.getElementById('bkst').textContent='❌ 文件读取失败';}
  };
  r.readAsText(f);
}

// ══ 单词列表 ══
let lf='all';
function renderList(){
  const c={new:0,unf:0,unk:0,mis:0,fgt:0,fam:0};
  words.forEach(w=>c[w.status]=(c[w.status]||0)+1);
  // stats bar 顺序：new unf unk mis fgt fam
  document.getElementById('stats-bar').innerHTML=
    `<div class="schip" onclick="setLF('all')" style="background:var(--sur2);color:var(--tx2);border-color:var(--bdr);">全部 <span style="font-family:'DM Mono',monospace;">${words.length}</span></div>`+
    ['new','unf','unk','mis','fgt','fam'].map(s=>
      `<div class="schip ${s}" onclick="setLF('${s}')">${SE[s]} ${SL[s]} <span style="font-family:'DM Mono',monospace;">${c[s]||0}</span></div>`
    ).join('');
  const fl=lf==='all'?words:words.filter(w=>w.status===lf);
  const g=document.getElementById('word-grid'),e=document.getElementById('empty-list');
  if(!fl.length){g.innerHTML='';e.style.display='block';return;}
  e.style.display='none';
  g.innerHTML=fl.map(w=>`
    <div class="wcs" onclick="openEdit(${w.id})">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:4px;">
        <div class="wcs-w" style="color:${w.wordColor||'var(--tx)'};">${w.word}</div>
        <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
          <div class="wcs-i" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${w.ipa||''}</div>
          <button onclick="event.stopPropagation();cpW(${w.id})" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px 6px;color:var(--tx3);">📋</button>
        </div>
      </div>
      ${w.pos?`<div class="wcs-p">${w.pos}</div>`:''}
      <div class="wcs-c">${w.cn}</div>
      ${w.exEn?`<div style="font-size:12px;color:var(--tx3);font-style:italic;margin-top:2px;">${w.exEn}</div>`:''}
      <div class="wcs-t t-${w.status||'new'}">${SE[w.status||'new']} ${SL[w.status||'new']}</div>
    </div>`).join('');
}
function setLF(f){lf=f;renderList();}
function cpW(id){
  const w=words.find(x=>x.id===id);if(!w)return;
  navigator.clipboard.writeText(w.word+(w.ipa?' /'+w.ipa+'/':'')+'\n'+(w.pos||'')+' '+w.cn+(w.exEn?'\n'+w.exEn:'')).then(()=>toast('📋 已复制！'));
}

// ══ 词库 ══
function renderV(){
  const cat=document.getElementById('vc').value;
  const sr=(document.getElementById('vs').value||'').toLowerCase();
  const lst=VB[cat]||[];
  const fl=sr?lst.filter(w=>w.toLowerCase().includes(sr)):lst;
  const ws=new Set(words.map(w=>w.word.toLowerCase()));
  document.getElementById('vcnt').textContent='共 '+fl.length+' 词';
  document.getElementById('vg').innerHTML=fl.map(w=>
    `<div class="vi ${ws.has(w.toLowerCase())?'in':''}" id="vi-${w.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="openVW('${w}')">
      <span style="font-family:'Lora',serif;font-weight:600;font-size:15px;">${w}</span>
      <span class="vi-cn" style="font-size:11px;color:var(--tx3);">${VCN[w.toLowerCase()]||VCN[w.toLowerCase().split('-')[0]]||''}</span>
    </div>`).join('');
  const needFetch=fl.filter(w=>!VCN[w.toLowerCase()]).slice(0,30);
  if(needFetch.length){
    (async()=>{
      for(let i=0;i<needFetch.length;i+=5){
        const batch=needFetch.slice(i,i+5);
        await Promise.all(batch.map(async w=>{
          const cn=await getCN(w);
          if(cn){const el=document.querySelector(`#vi-${w.replace(/[^a-zA-Z0-9]/g,'_')} .vi-cn`);if(el)el.textContent=cn;}
        }));
        await new Promise(r=>setTimeout(r,300));
      }
    })();
  }
}

async function openVW(word){
  const existingWord=words.find(w=>w.word.toLowerCase()===word.toLowerCase());
  if(existingWord){
    // Show popup with Chinese meaning and go-to-card option
    document.getElementById('vm').classList.add('show');
    document.getElementById('vmt').textContent='📖 '+word;
    document.getElementById('vml').style.display='block';
    document.getElementById('vml').innerHTML=
      '<div style="padding:10px 0;">'
      +'<div style="font-size:13px;color:var(--tx3);margin-bottom:8px;">已在单词列表中</div>'
      +(existingWord.ipa?'<div style="font-size:14px;color:var(--tx3);margin-bottom:8px;">/'+existingWord.ipa+'/</div>':'')
      +(existingWord.pos?'<div style="font-size:12px;color:var(--ac2);background:var(--ac2-l);display:inline-block;padding:2px 8px;border-radius:10px;margin-bottom:10px;">'+existingWord.pos+'</div>':'')
      +'<div style="font-size:22px;font-weight:700;color:var(--tx);margin-bottom:10px;">'+existingWord.cn+'</div>'
      +(existingWord.exEn?'<div style="font-size:14px;font-style:italic;color:var(--tx2);margin-bottom:4px;">'+existingWord.exEn+'</div>':'')
      +(existingWord.exCn?'<div style="font-size:13px;color:var(--tx3);">'+existingWord.exCn+'</div>':'')
      +(existingWord.note?'<div style="font-size:13px;color:var(--ac);margin-top:8px;">📝 '+existingWord.note+'</div>':'')
      +'</div>';
    document.getElementById('vmf').style.display='none';
    document.getElementById('vmsb').style.display='none';
    document.getElementById('vmgc').style.display='inline-flex';
    // Store word for goToCardFromVM
    document.getElementById('vmw').value=word;
    return;
  }
  document.getElementById('vm').classList.add('show');
  document.getElementById('vmt').textContent='添加：'+word;
  document.getElementById('vml').style.display='block';
  document.getElementById('vml').textContent='🔍 正在查询字典并翻译…';
  document.getElementById('vmf').style.display='none';
  document.getElementById('vmsb').style.display='none';
  const preCn=VCN[word.toLowerCase()]||'';
  let ipa='',pos='',exEn='',allDefs='',defCn='',exCn='';
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    const d=await r.json();
    if(Array.isArray(d)&&d[0]){
      ipa=(d[0].phonetics?.find(p=>p.text)?.text||'').replace(/\//g,'');
      const ms=d[0].meanings||[];
      pos=ms[0]?.partOfSpeech||'';
      const dfs=ms.flatMap(m=>m.definitions||[]);
      exEn=dfs.find(df=>df.example)?.example||'';
      allDefs=ms.map(m=>m.partOfSpeech+': '+m.definitions.slice(0,2).map(df=>df.definition).join('; ')).join('\n');
    }
  }catch(e){}
  if((allDefs||exEn)&&!preCn){
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:[{type:'text',text:`翻译成中文，格式：\n中文释义：[简洁意思]\n例句译：[例句翻译，无则留空]\n单词：${word}\n释义：${allDefs}\n例句：${exEn}`}]}]})});
      const ad=await resp.json();
      const txt=ad.content?.map(c=>c.text||'').join('')||'';
      const cm=txt.match(/中文释义：(.+)/),em=txt.match(/例句译：(.+)/);
      if(cm)defCn=cm[1].trim();if(em)exCn=em[1].trim();
    }catch(e){}
  }
  document.getElementById('vmw').value=word;
  document.getElementById('vmipa').value=ipa;
  document.getElementById('vmpos').value=pos;
  document.getElementById('vmcn').value=preCn||defCn;
  document.getElementById('vmee').value=exEn;
  document.getElementById('vmce').value=exCn;
  document.getElementById('vmnt').value='';
  document.getElementById('vmst').value='new';
  document.getElementById('vml').style.display='none';
  document.getElementById('vmf').style.display='block';
  document.getElementById('vmsb').style.display='inline-flex';
  document.getElementById('vmgc').style.display='none';
}
function saveVM(){
  const word=document.getElementById('vmw').value.trim();
  const cn=document.getElementById('vmcn').value.trim();
  if(!cn){toast('请填写中文意思！');return;}
  words.push({id:Date.now(),word,ipa:document.getElementById('vmipa').value.trim(),pos:document.getElementById('vmpos').value.trim(),cn,kr:'',exEn:document.getElementById('vmee').value.trim(),exCn:document.getElementById('vmce').value.trim(),exKr:'',status:document.getElementById('vmst').value,note:document.getElementById('vmnt').value.trim(),noteHtml:'',ipaHtml:'',exEnHtml:'',wordColor:'',wordColorHtml:'',cnHtml:''});
  save();renderV();toast('✅ 已添加：'+word);
  document.getElementById('vmsb').style.display='none';
  document.getElementById('vmgc').style.display='inline-flex';
}
function closeVM(){document.getElementById('vm').classList.remove('show');}
function goToCardFromVM(){
  const word=document.getElementById('vmw').value.trim();
  closeVM();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-fc').classList.add('active');
  document.querySelectorAll('.nb')[1].classList.add('active');
  deck=[...words];
  const w=words.find(x=>x.word.toLowerCase()===word.toLowerCase());
  const i=w?deck.findIndex(x=>x.id===w.id):0;
  idx=i>=0?i:0;flipped=false;
  document.getElementById('ci').classList.remove('flipped');renderCard();
}
function goToCardFromVocab(){

  const exists=words.some(w=>w.word.toLowerCase()===val.trim().toLowerCase());
  hint.style.display=exists&&val.trim()?'block':'none';
}
function goToDupCard(){
  const val=document.getElementById('fw').value.trim();

  document.querySelectorAll('.nb')[1].classList.add('active');

  const i=deck.findIndex(x=>x.id===w.id);
  idx=i>=0?i:0;flipped=false;

function addWord(){
  const w=document.getElementById('fw').value.trim(),cn=document.getElementById('fcn').value.trim();
  if(!w||!cn){toast('请填写英文单词和中文意思！');return;}
  if(words.some(x=>x.word.toLowerCase()===w.toLowerCase())){toast('⚠️ 这个单词已存在！');return;}
  words.push({id:Date.now(),word:w,cn,ipa:document.getElementById('fipa').value.trim(),pos:document.getElementById('fpos').value,kr:'',exEn:document.getElementById('fee').value.trim(),exCn:document.getElementById('fce').value.trim(),exKr:'',status:document.getElementById('fst').value,note:document.getElementById('fnt').value.trim(),noteHtml:'',ipaHtml:'',exEnHtml:'',wordColor:'',wordColorHtml:'',cnHtml:''});
  save();['fw','fipa','fcn','fee','fce','fnt'].forEach(id=>document.getElementById(id).value='');
  toast('✅ 单词已保存！');
}

// ══ 编辑 ══
function openEdit(id){
  const w=words.find(x=>x.id===id);if(!w)return;
  ['eid','ew','eipa','ecn','eee','ece','ent'].forEach(k=>document.getElementById(k).value=
    k==='eid'?id:k==='ew'?w.word:k==='eipa'?w.ipa||'':k==='ecn'?w.cn:k==='eee'?w.exEn||'':k==='ece'?w.exCn||'':w.note||'');
  document.getElementById('epos').value=w.pos||'n.';
  document.getElementById('est').value=w.status;
  document.getElementById('edit-mo').classList.add('show');
}
function closeMo(){document.getElementById('edit-mo').classList.remove('show');}
function saveEdit(){
  const id=+document.getElementById('eid').value,w=words.find(x=>x.id===id);if(!w)return;
  const newIpa=document.getElementById('eipa').value.trim(),newExEn=document.getElementById('eee').value.trim();
  if(newIpa!==w.ipa)w.ipaHtml='';if(newExEn!==w.exEn)w.exEnHtml='';
  w.word=document.getElementById('ew').value.trim();w.ipa=newIpa;w.pos=document.getElementById('epos').value;
  w.cn=document.getElementById('ecn').value.trim();w.kr='';w.exEn=newExEn;
  w.exCn=document.getElementById('ece').value.trim();w.status=document.getElementById('est').value;
  w.note=document.getElementById('ent').value.trim();
  save();closeMo();renderList();toast('✅ 已更新！');
}
function delWord(){
  if(!confirm('确定删除？'))return;
  const id=+document.getElementById('eid').value;
  words=words.filter(x=>x.id!==id);
  save();closeMo();renderList();toast('🗑 已删除');
}
function goToCard(){
  jumpId=+document.getElementById('eid').value;closeMo();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-fc').classList.add('active');
  document.querySelectorAll('.nb')[1].classList.add('active');
  deck=[...words];
  const i=deck.findIndex(w=>w.id===jumpId);idx=i>=0?i:0;jumpId=null;flipped=false;
  document.getElementById('ci').classList.remove('flipped');renderCard();
}

// ══ 卡片 ══
function initFC(){deck=[...words].sort(()=>Math.random()-.5);idx=0;flipped=false;document.getElementById('ci').classList.remove('flipped');renderCard();}

function renderCard(){
  hideTb();savedSel=null;lne=null;
  if(!deck.length){
    document.getElementById('cfw').textContent='没有单词';
    ['cfi','cfn'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});
    document.getElementById('cfe').innerHTML='';
    document.getElementById('cbc').innerHTML='<p style="color:var(--tx3)">请先添加单词</p>';
    document.getElementById('fcp').textContent='0 / 0';return;
  }
  const w=deck[idx];
  const wEl=document.getElementById('cfw');
  if(w.wordColorHtml){wEl.innerHTML=w.wordColorHtml;wEl.style.color='';}
  else{wEl.textContent=w.word;wEl.style.color=w.wordColor||'var(--tx)';}
  const sb=document.getElementById('cf-status'),st=w.status||'new';
  sb.textContent=SE[st]+' '+SL[st];sb.className='sbadge '+st;
  document.getElementById('cfi')[w.ipaHtml?'innerHTML':'textContent']=w.ipaHtml||(w.ipa?'/'+w.ipa+'/':'');
  document.getElementById('cfn').innerHTML=w.noteHtml||(w.note||'');
  if(w.exEn){
    document.getElementById('cfe').innerHTML=
      `<div class="cfe-en no-flip" contenteditable="true"
        onfocus="lne=this" onmouseup="onNUp(event)"
        oninput="lne=this;saveFieldEl('exEnHtml',this)">${w.exEnHtml||w.exEn}</div>`;
  }else{
    document.getElementById('cfe').innerHTML='<button class="no-flip" onclick="lookup()" style="margin-top:8px;background:var(--ac-l);color:var(--ac);border:none;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;">🔍 查询音标/例句</button>';
  }
  const spkReadBtn=document.getElementById('spk-read');
  const spkWordBtn=document.getElementById('spk-word');
  const newRead=spkReadBtn.cloneNode(true);
  const newWord=spkWordBtn.cloneNode(true);
  spkReadBtn.parentNode.replaceChild(newRead,spkReadBtn);
  spkWordBtn.parentNode.replaceChild(newWord,spkWordBtn);
  if(w.exEn){newRead.textContent='🔊 朗读例句';newRead.addEventListener('click',()=>spkS(w.exEn));}
  else{newRead.textContent='🔊 朗读单词';newRead.addEventListener('click',()=>spkW());}
  newWord.textContent='🎵 听发音';newWord.addEventListener('click',()=>spkW());
  document.getElementById('fcp').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('cbc').innerHTML=`
    ${w.pos?`<div style="font-size:12px;font-weight:600;color:var(--ac2);background:var(--ac2-l);padding:2px 9px;border-radius:10px;width:fit-content;">${w.pos}</div>`:''}
    <div id="cbc-cn" class="no-flip" contenteditable="true"
      onfocus="lne=this" onmouseup="onNUp(event)"
      oninput="lne=this;saveField('cnHtml','cbc-cn')"
      style="font-size:22px;font-weight:700;user-select:text;outline:none;word-break:break-word;cursor:text;">${w.cnHtml||w.cn}</div>
    ${w.exCn?`<div style="height:1px;background:var(--bdr);"></div><div style="font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:1px;">例句中文</div><div style="font-size:17px;color:var(--tx);line-height:1.6;user-select:text;">${w.exCn}</div>`:''}
    ${w.exEn?`<div style="height:1px;background:var(--bdr);"></div>
      <div style="font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:1px;display:flex;align-items:center;gap:8px;">例句（英文）
        <button id="back-spk-btn" style="background:var(--ac-l);color:var(--ac);border:none;border-radius:14px;padding:3px 10px;font-size:11px;cursor:pointer;">🔊</button>
      </div>
      <div style="font-size:21px;font-family:'Lora',serif;font-style:italic;line-height:1.5;user-select:text;">${w.exEn}</div>`:''}
    <div style="height:1px;background:var(--bdr);"></div>
    ${!w.exCn&&w.exEn?`<button id="trans-ex-btn" onclick="event.stopPropagation();transEx(event)" style="width:100%;background:var(--fgt-b);color:var(--fgt);border:1.5px solid var(--fgt);border-radius:10px;padding:7px;font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;">🌐 翻译例句</button>`:''}
    <div id="cbn" class="rnote-b" contenteditable="true" data-ph="标注…"
      onfocus="lne=this" onmouseup="onNUp(event)"
      oninput="lne=this;saveN()">${w.noteHtml||(w.note||'')}</div>`;
  if(w.exEn){const backSpk=document.getElementById('back-spk-btn');if(backSpk)backSpk.addEventListener('click',()=>spkS(w.exEn));}
  flipped=false;document.getElementById('ci').classList.remove('flipped');
}

function flipCard(){flipped=!flipped;document.getElementById('ci').classList.toggle('flipped',flipped);}
function nextCard(){if(!deck.length)return;idx=(idx+1)%deck.length;renderCard();}
function prevCard(){if(!deck.length)return;idx=(idx-1+deck.length)%deck.length;renderCard();}

function classifyOnly(status){
  if(!deck.length)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id);
  if(o){o.status=status;w.status=status;save();}
  const sb=document.getElementById('cf-status');
  if(sb){sb.textContent=SE[status]+' '+SL[status];sb.className='sbadge '+status;}
  renderCard();toast(SE[status]+' 已改为「'+SL[status]+'」');
}

// ══ TTS ══
function ensureVoices(cb){
  const vs=speechSynthesis.getVoices();
  if(vs.length){cb(vs);return;}
  speechSynthesis.onvoiceschanged=()=>{cb(speechSynthesis.getVoices());};
}
function fbTTS(t){
  if(!t)return;speechSynthesis.cancel();
  ensureVoices(voices=>{
    const u=new SpeechSynthesisUtterance(t);
    const v=voices.find(x=>x.lang==='en-GB')||voices.find(x=>x.lang.startsWith('en-US'))||voices.find(x=>x.lang.startsWith('en'))||null;
    if(v)u.voice=v;u.lang='en-GB';u.rate=0.85;speechSynthesis.speak(u);
  });
}
function spkT(text){
  if(!text)return;
  const trimmed=text.trim();
  if(trimmed.split(/\s+/).length===1){
    fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(trimmed))
      .then(r=>r.json()).then(d=>{
        const ph=d[0]?.phonetics||[];
        const au=ph.find(p=>p.audio&&p.audio.includes('uk'))?.audio||ph.find(p=>p.audio&&p.audio.includes('us'))?.audio||ph.find(p=>p.audio)?.audio;
        if(au){const audio=new Audio(au);audio.play().catch(()=>fbTTS(trimmed));}
        else fbTTS(trimmed);
      }).catch(()=>fbTTS(trimmed));
  }else fbTTS(trimmed);
}
function spkW(){if(!deck.length)return;spkT(deck[idx].word);}
function spkS(text){if(!text)return;fbTTS(text);toast('🔊 朗读中…');}

async function transEx(e){
  if(e)e.stopPropagation();
  if(!deck.length)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id);if(!o||!w.exEn)return;
  const btn=document.getElementById('trans-ex-btn');
  if(btn){btn.textContent='⏳ 翻译中…';btn.disabled=true;}
  try{
    const url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(w.exEn)+'&langpair=en|zh';
    const resp=await fetch(url);const d=await resp.json();
    const translated=(d.responseData?.translatedText||'').trim();
    if(translated&&translated!==w.exEn&&d.responseStatus===200){
      o.exCn=translated;w.exCn=translated;save();
      const cbc=document.getElementById('cbc');
      if(cbc){
        const tb=document.getElementById('trans-ex-btn');if(tb)tb.style.display='none';
        const existCn=cbc.querySelector('.trans-cn-result');
        if(!existCn){
          const div=document.createElement('div');div.className='trans-cn-result';
          div.style.cssText='font-size:15px;color:var(--tx2);margin-top:4px;line-height:1.6;padding:6px 0;';
          div.textContent=translated;if(tb)tb.parentNode.insertBefore(div,tb);else cbc.appendChild(div);
        }
      }
      toast('✅ 翻译完成！');
    }else{if(btn){btn.textContent='🌐 翻译例句';btn.disabled=false;}toast('翻译失败，请手动输入');}
  }catch(e){if(btn){btn.textContent='🌐 翻译例句';btn.disabled=false;}toast('网络错误，请稍后重试');}
}

async function lookup(){
  if(!deck.length)return;
  const w=deck[idx],o=words.find(x=>x.id===w.id);if(!o)return;
  document.getElementById('cfe').innerHTML='<span style="font-size:13px;color:var(--tx3);">🔍 查询中…</span>';
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(w.word));
    const d=await r.json();
    if(Array.isArray(d)&&d[0]){
      const ipa=(d[0].phonetics?.find(p=>p.text)?.text||'').replace(/\//g,'');
      const ms=d[0].meanings||[];
      const dfs=ms.flatMap(m=>m.definitions||[]);
      const exEn=dfs.find(df=>df.example)?.example||'';
      const allDefs=ms.map(m=>m.partOfSpeech+': '+m.definitions.slice(0,2).map(df=>df.definition).join('; ')).join('\n');
      if(ipa&&!o.ipa){o.ipa=ipa;w.ipa=ipa;}
      if(ms[0]?.partOfSpeech&&!o.pos){o.pos=ms[0].partOfSpeech;w.pos=ms[0].partOfSpeech;}
      if(exEn&&!o.exEn){o.exEn=exEn;w.exEn=exEn;}
      if(exEn||allDefs){
        try{
          const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:[{type:'text',text:`翻译：\n中文释义：[简洁中文]\n例句译：[例句翻译，无则留空]\n单词：${w.word}\n释义：${allDefs}\n例句：${exEn}`}]}]})});
          const ad=await resp.json();
          const txt=ad.content?.map(c=>c.text||'').join('')||'';
          const cm=txt.match(/中文释义：(.+)/),em=txt.match(/例句译：(.+)/);
          if(cm&&!o.cn.includes(cm[1].trim().slice(0,4))){o.cn=cm[1].trim();w.cn=cm[1].trim();}
          if(em&&em[1].trim()&&em[1].trim()!=='无'){o.exCn=em[1].trim();w.exCn=em[1].trim();}
        }catch(e){}
      }
      save();renderCard();toast('✅ 已补全！');
    }
  }catch(e){document.getElementById('cfe').innerHTML='<span style="font-size:13px;color:var(--mis);">查询失败</span>';}
}

// ══ 工具条 ══
document.addEventListener('mousedown',e=>{
  const tb=document.getElementById('ntb');if(!tb)return;
  const areas=['cfn','cbn','cfi'];
  const cfeEl=document.querySelector('.cfe-en');
  const cfwEl2=document.getElementById('cfw');
  const cbcCn=document.getElementById('cbc-cn');
  if(!tb.contains(e.target)&&!areas.some(id=>{const el=document.getElementById(id);return el&&el.contains(e.target);})&&!(cfeEl&&cfeEl.contains(e.target))&&!(cfwEl2&&cfwEl2.contains(e.target))&&!(cbcCn&&cbcCn.contains(e.target))){
    hideTb();savedSel=null;
  }
});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ 数据迁移 ══
(function(){
  const sm={unfamiliar:'unf',misspell:'mis',forgot:'fgt',familiar:'fam'};
  let changed=false;
  words.forEach(w=>{
    if(!w.status||!SL[w.status]){w.status='new';changed=true;}
    if(sm[w.status]){w.status=sm[w.status];changed=true;}
    ['noteHtml','ipaHtml','exEnHtml','wordColor','wordColorHtml','cnHtml'].forEach(k=>{if(!w[k]){w[k]='';changed=true;}});
  });
  if(changed)localStorage.setItem('wc_words',JSON.stringify(words));
})();

renderList();
